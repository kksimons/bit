<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/config/styles.css" />
    <title>Bit Settings</title>
    <script type="module" src="/src/config/main.ts" defer></script>
  </head>
  <body>
    <main class="config">
      <header>
        <h1>bit</h1>
        <span class="badge">settings</span>
      </header>

      <section>
        <h2>Agent (Z.AI)</h2>
        <label>
          Base URL
          <input id="base_url" type="text" spellcheck="false" autocomplete="off" />
        </label>
        <label>
          Model
          <input id="model" type="text" spellcheck="false" autocomplete="off" />
        </label>
        <label>
          API key
          <input id="api_key" type="password" autocomplete="off" />
        </label>
        <button id="save">Save</button>
        <p class="muted" id="status"></p>
      </section>

      <section>
        <h2>Voice</h2>
        <p class="muted">
          Push-to-talk: hold <kbd>⌘⇧Space</kbd>, speak, release. Transcribed
          locally with Parakeet&nbsp;v2.
        </p>
      </section>

      <section>
        <h2>Tools</h2>
        <p class="muted">Actions Bit can take on your computer — coming in M6.</p>
      </section>
    </main>
  </body>
</html>
